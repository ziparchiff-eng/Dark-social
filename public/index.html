<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARK SOCIAL — ULTRA</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000; --card-bg: #121212; --accent-color: #fff;
            --text-main: #fff; --text-secondary: #8e8e8e; --border-color: #262626;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); color: white; width: 100%; text-align: center; padding: 18px 0; font-size: 18px; font-weight: 700; letter-spacing: 3px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .container { width: 100%; max-width: 600px; padding: 0 15px; margin-top: 20px; padding-bottom: 100px; }
        .stories-container { display: flex; gap: 12px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        .story { width: 68px; height: 68px; background: #222; border-radius: 50%; border: 2px solid var(--accent-color); object-fit: cover; }
        .story-name { font-size: 11px; color: var(--text-secondary); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 24px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        input, textarea { width: 100%; background: #1a1a1a; color: white; padding: 14px; border: 1px solid var(--border-color); border-radius: 14px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        button { background: var(--accent-color); color: black; border: none; padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-story { background: transparent; color: white; border: 1px solid white; margin-right: 10px; }
        .post { background: var(--card-bg); padding: 20px; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border-color); animation: slideDown 0.4s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .post-user { font-weight: 600; }
        .post-date { font-size: 12px; color: var(--text-secondary); }
        .post-text { font-size: 15px; margin-bottom: 15px; color: #ddd; }
        .post img, .post video { width: 100%; border-radius: 15px; }
        #chat-box { height: 300px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .msg-received { background: #222; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-sent { background: #fff; color: black; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-user { font-size: 10px; opacity: 0.7; display: block; margin-bottom: 4px; }
        .chat-input-area { display: flex; gap: 10px; }
    </style>
</head>
<body>
<header>DARK SOCIAL</header>
<div class="container">
    <div class="stories-container" id="stories"></div>
    <div class="card">
        <div style="margin-bottom: 15px; font-weight: 600;">Создать публикацию</div>
        <input type="text" id="username" placeholder="Ваше имя">
        <textarea id="postText" rows="3" placeholder="О чем вы думаете?"></textarea>
        <input type="file" id="fileInput" accept="image/*,video/*">
        <div style="display: flex; justify-content: flex-end;">
            <button id="btnStory" class="btn-story" onclick="uploadContent('story')">В историю</button>
            <button id="btnPost" onclick="uploadContent('post')">Опубликовать</button>
        </div>
    </div>
    <div id="feed"></div>
    <div class="card">
        <div style="margin-bottom: 15px; font-weight: 600; text-align: center;">Live Chat</div>
        <div id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Сообщение..." style="margin-bottom: 0;">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>
<script>
    const socket = io();

    // --- ЗАПОЛНИ ЭТИ ДАННЫЕ ИЗ CLOUDINARY ---
    const CLOUD_NAME = 'dyefptrpj'; 
    const UPLOAD_PRESET = 'dark_social_preset'; 
    // --------------------------------------

    function createPostHTML(p) {
        return `<div class="post"><div class="post-header"><span class="post-user">${p.username}</span><span class="post-date">${p.date}</span></div><div class="post-text">${p.text}</div>${p.file ? (p.file.match(/\.(mp4|mov|webm)$/i) ? `<video src="${p.file}" controls></video>` : `<img src="${p.file}">`) : ''}</div>`;
    }
    function createStoryHTML(s) {
        return `<div class="story-wrapper"><img src="${s.file}" class="story"><span class="story-name">${s.username}</span></div>`;
    }

    async function uploadContent(type) {
        const userField = document.getElementById('username');
        const textField = document.getElementById('postText');
        const fileField = document.getElementById('fileInput');
        const btnPost = document.getElementById('btnPost');
        const btnStory = document.getElementById('btnStory');
        
        const username = userField.value || 'Аноним';
        const text = textField.value;
        const file = fileField.files[0];
        let fileUrl = null;

        if (file) {
            btnPost.disabled = true; btnStory.disabled = true;
            btnPost.innerText = "Загрузка..."; btnStory.innerText = "Загрузка...";
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) { fileUrl = data.secure_url; } else {
                    alert("Ошибка облака: " + (data.error ? data.error.message : "Ошибка"));
                    btnPost.disabled = false; btnStory.disabled = false;
                    btnPost.innerText = "Опубликовать"; btnStory.innerText = "В историю";
                    return;
                }
            } catch (e) {
                alert("Ошибка сети при загрузке");
                btnPost.disabled = false; btnStory.disabled = false;
                btnPost.innerText = "Опубликовать"; btnStory.innerText = "В историю";
                return;
            }
        }

        try {
            await fetch('/upload', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ username, text, file: fileUrl, type }) 
            });
            textField.value = ''; fileField.value = '';
        } catch (e) { alert("Ошибка сервера"); }
        
        btnPost.disabled = false; btnStory.disabled = false;
        btnPost.innerText = "Опубликовать"; btnStory.innerText = "В историю";
    }

    async function init() {
        const pRes = await fetch('/api/posts');
        const posts = await pRes.json();
        document.getElementById('feed').innerHTML = posts.map(p => createPostHTML(p)).join('');
        const sRes = await fetch('/api/stories');
        const stories = await sRes.json();
        document.getElementById('stories').innerHTML = stories.map(s => createStoryHTML(s)).join('');
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const user = document.getElementById('username').value || 'Аноним';
        if (input.value.trim()) {
            socket.emit('message', { user, text: input
