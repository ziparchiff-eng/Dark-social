<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARK SOCIAL — Final</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #000; --card-bg: #121212; --accent-color: #fff; --text-main: #fff; --text-secondary: #8e8e8e; --border-color: #262626; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); color: white; width: 100%; text-align: center; padding: 18px 0; font-size: 18px; font-weight: 700; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .container { width: 100%; max-width: 600px; padding: 0 15px; margin-top: 20px; padding-bottom: 80px; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); width: 90%; max-width: 380px; text-align: center; }
        .hidden { display: none !important; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: rgba(18,18,18,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border-color); z-index: 1000; }
        .nav-item { cursor: pointer; font-size: 12px; color: var(--text-secondary); transition: 0.3s; font-weight: 600; }
        .nav-item.active { color: var(--accent-color); }
        .stories-container { display: flex; gap: 12px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; cursor: pointer; }
        .story { width: 68px; height: 68px; background: #222; border-radius: 50%; border: 2px solid var(--accent-color); object-fit: cover; }
        .story-name { font-size: 11px; color: var(--text-secondary); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 24px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #1a1a1a; color: white; padding: 12px; border: 1px solid var(--border-color); border-radius: 14px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        button { background: var(--accent-color); color: black; border: none; padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .btn-story { background: transparent; color: white; border: 1px solid white; margin-right: 10px; }
        .post { background: var(--card-bg); padding: 20px; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .post img, .post video { width: 100%; max-height: 500px; object-fit: cover; border-radius: 16px; display: block; }
        .btn-delete { position: absolute; top: 15px; right: 15px; background: #ff4444; color: white; border: none; padding: 5px 10px; font-size: 11px; border-radius: 8px; cursor: pointer; }
        #chat-box { height: 300px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .msg-received { background: #222; color: white; align-self: flex-start; }
        .msg-sent { background: #fff; color: black; align-self: flex-end; }
        .msg-user { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 4px; }
        .profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px; margin-bottom: 30px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #1a1a1a; border-radius: 15px; cursor: pointer; margin-bottom: 5px; }
        .user-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-form">
        <h2 style="margin-top:0">Вход</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth('login')" style="width:100%">Войти</button>
        <p style="font-size:13px; color:#8e8e8e; cursor:pointer; margin-top:15px" onclick="toggleAuth()">Регистрация</p>
    </div>
    <div class="auth-card hidden" id="reg-form">
        <h2 style="margin-top:0">Регистрация</h2>
        <input type="text" id="reg-user" placeholder="Логин">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="handleAuth('register')" style="width:100%">Создать</button>
        <p style="font-size:13px; color:#8e8e8e; cursor:pointer; margin-top:15px" onclick="toggleAuth()">Войти</p>
    </div>
</div>

<header>DARK SOCIAL</header>
<div class="container">
    <div id="screen-home">
        <div class="stories-container" id="stories"></div>
        <div class="card">
            <div style="margin-bottom: 15px; font-weight: 600;">Создать публикацию</div>
            <textarea id="postText" rows="3" placeholder="О чем вы думаете?"></textarea>
            <input type="file" id="fileInput" accept="image/*,video/*">
            <div style="display: flex; justify-content: flex-end;">
                <button class="btn-story" onclick="uploadContent('story')">В историю</button>
                <button onclick="uploadContent('post')">Опубликовать</button>
            </div>
        </div>
        <div id="feed"></div>
        <div class="card">
            <div style="text-align: center; margin-bottom: 10px; font-weight:600">Live Chat</div>
            <div id="chat-box"></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chatInput" placeholder="Сообщение..." style="margin-bottom:0">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <div id="screen-search" class="hidden">
        <div class="card">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchQuery" placeholder="Поиск по @username..." style="margin-bottom:0">
                <button onclick="searchUsers()">Найти</button>
            </div>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="screen-profile" class="hidden">
        <div class="card profile-header" id="profile-info"></div>
        <div id="profile-posts"></div>
        <div class="card hidden" id="edit-profile-card">
            <div style="font-weight:600; margin-bottom:15px">Редактировать профиль</div>
            <input type="text" id="edit-handle" placeholder="Новый @username">
            <textarea id="edit-bio" placeholder="О себе..."></textarea>
            <input type="file" id="edit-avatar" accept="image/*">
            <button onclick="saveProfile()">Сохранить</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="showScreen('home')">Главная</div>
    <div class="nav-item" id="nav-search" onclick="showScreen('search')">Поиск</div>
    <div class="nav-item" id="nav-profile" onclick="showScreen('profile')">Профиль</div>
</div>

<script>
    const socket = io();
    let currentUser = null;

    // --- ЗАПОЛНИ ЭТИ ДАННЫЕ ИЗ CLOUDINARY ---
    const CLOUD_NAME = 'dyefptrpj'; 
    const UPLOAD_PRESET = 'dark_social_preset'; 

    function toggleAuth() {
        document.getElementById('login-form').classList.toggle('hidden');
        document.getElementById('reg-form').classList.toggle('hidden');
    }

    async function handleAuth(type) {
        const user = type === 'login' ? document.getElementById('auth-user').value : document.getElementById('reg-user').value;
        const pass = type === 'login' ? document.getElementById('auth-pass').value : document.getElementById('reg-pass').value;
        if(!user || !pass) return alert("Заполните все поля");

        try {
            const res = await fetch(`/auth/${type}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = type === 'login' ? data.username : user;
                document.getElementById('auth-screen').classList.add('hidden');
                init();
            } else { alert(data.error); }
        } catch (e) { alert("Ошибка сервера"); }
    }

    function showScreen(screen) {
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-search').classList.add('hidden');
        document.getElementById('screen-profile').classList.add('hidden');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('screen-' + screen).classList.remove('hidden');
        document.getElementById('nav-' + screen).classList.add('active');
        if (screen === 'profile') loadMyProfile();
    }

    function createPostHTML(p) {
        const isAdmin = currentUser === 'admin';
        return `
            <div class="post">
                ${isAdmin ? `<button class="btn-delete" onclick="deletePost('${p._id}')">Удалить</button>` : ''}
                <div class="post-header"><b style="color:white">${p.username}</b> <small style="color:#8e8e8e">${// Use Date.toLocaleString if p.date is a string/date
                    p.date ? new Date(p.date).toLocaleString() : ''}</small></div>
                <div class="post-text">${p.text}</div>
                ${p.file ? (p.file.match(/\.(mp4|mov|webm)$/i) ? `<video src="${p.file}" controls></video>` : `<img src="${p.file}">`) : ''}
            </div>`;
    }

    async function deletePost(id) {
        if (confirm("Удалить?")) {
            await fetch('/delete-post', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, postId: id })
            });
        }
    }

    async function uploadContent(type) {
        const text = document.getElementById('postText').value;
        const fileInput = document.getElementById('fileInput');
        let fileUrl = null;
        if (fileInput.files[0]) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('upload_preset', UPLOAD_PRESET);
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                fileUrl = data.secure_url;
            } catch (e) { alert("Ошибка облака"); return; }
        }
        await fetch('/upload', { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ username: currentUser, text, file: fileUrl, type }) 
        });
        document.getElementById('postText').value = '';
        document.getElementById('fileInput').value = '';
    }

    async function init() {
        try {
            const pRes = await fetch('/api/posts');
            const posts = await pRes.json();
            document.getElementById('feed').innerHTML = posts.map(p => createPostHTML(p)).join('');
            const sRes = await fetch('/api/stories');
            const stories = await sRes.json();
            document.getElementById('stories').innerHTML = stories.map(s => `<div class="story-wrapper"><img src="${s.file}" class="story"><div class="story-name">${s.username}</div></div>`).join('');
        } catch (e) { console.error("Error loading data"); }
    }

    async function searchUsers() {
        const q = document.getElementById('searchQuery').value;
        const res = await fetch(`/api/search?q=${q}`);
        const users = await res.json();
        document.getElementById('search-results').innerHTML = users.map(u => `
            <div class="user-item" onclick="viewProfile('${u.handle}')">
                <img src="${u.avatar}">
                <div><b>${u.username}</b><br><small>@${u.handle}</small></div>
            </div>`).join('');
    }

    async function viewProfile(handle) {
        const res = await fetch(`/api/profile/${handle}`);
        const { user, posts } = await res.json();
        showScreen('profile');
        document.getElementById('profile-info').innerHTML = `
            <img src="${user.avatar}" class="profile-avatar">
            <div class="profile-handle">@${user.handle}</div>
            <div class="profile-bio">${user.bio}</div>
            ${user.username === currentUser ? `<button onclick="document.getElementById('edit-profile-card').classList.toggle('hidden')">Редактировать</button>` : ''}
        `;
        document.getElementById('profile-posts').innerHTML = posts.map(p => createPostHTML(p)).join('');
    }

    async function loadMyProfile() {
        try {
            const res = await fetch(`/api/profile/${currentUser.toLowerCase().replace(/\s+/g, '_')}`);
            const { user, posts } = await res.json();
            if(!user) return;
            document.getElementById('profile-info').innerHTML = `
                <img src="${user.avatar}" class="profile-avatar">
                <div class="profile-handle">@${user.handle}</div>
                <div class="profile-bio">${user.bio}</div>
                <button onclick="document.getElementById('edit-profile-card').classList.toggle('hidden')">Редактировать</button>
            `;
            document.getElementById('profile-posts').innerHTML = posts.map(p => createPostHTML(p)).join('');
        } catch (e) { console.log("Profile load error"); }
    }

    async function saveProfile() {
        const handle = document.getElementById('edit-handle').value;
        const bio = document.getElementById('edit-bio').value;
        const fileInput = document.getElementById('edit-avatar');
        let avatarUrl = null;
        if (fileInput.files[0]) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            avatarUrl = data.secure_url;
        }
        await fetch('/api/user/update', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser, avatar: avatarUrl, bio, handle })
        });
        alert("Обновлено!");
        loadMyProfile();
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        if (input.value.trim()) {
            socket.emit('message', { user: currentUser, text: input.value });
            input.value = '';
        }
    }

    socket.on('new-post', () => init());
    socket.on('new-story', (story) => {
        document.getElementById('stories').insertAdjacentHTML('afterbegin', `<div class="story-wrapper"><img src="${story.file}" class="story"><div class="story-name">${story.username}</div></div>`);
    });
    socket.on('refresh-content', () => init());
    socket.on('message', (msg) => {
        const box = document.getElementById('chat-box');
        const isMe = msg.user === currentUser;
        box.innerHTML += `<div class="msg ${isMe ? 'msg-sent' : 'msg-received'}"><span class="msg-user">${msg.user}</span>${msg.text}</div>`;
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
