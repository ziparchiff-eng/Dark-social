<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARK SOCIAL — Admin Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000; --card-bg: #121212; --accent-color: #fff;
            --text-main: #fff; --text-secondary: #8e8e8e; --border-color: #262626;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); color: white; width: 100%; text-align: center; padding: 18px 0; font-size: 18px; font-weight: 700; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .container { width: 100%; max-width: 600px; padding: 0 15px; margin-top: 20px; padding-bottom: 100px; }
        
        /* Auth Screens */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); width: 90%; max-width: 400px; text-align: center; }
        
        .hidden { display: none !important; }
        
        .stories-container { display: flex; gap: 12px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .story-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        .story { width: 68px; height: 68px; background: #222; border-radius: 50%; border: 2px solid var(--accent-color); object-fit: cover; }
        .story-name { font-size: 11px; color: var(--text-secondary); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 24px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        input, textarea { width: 100%; background: #1a1a1a; color: white; padding: 14px; border: 1px solid var(--border-color); border-radius: 14px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        button { background: var(--accent-color); color: black; border: none; padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .btn-story { background: transparent; color: white; border: 1px solid white; margin-right: 10px; }
        .post { background: var(--card-bg); padding: 20px; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border-color); position: relative; }
        .post img, .post video { width: 100%; border-radius: 15px; }
        .btn-delete { background: #ff4444; color: white; padding: 5px 10px; font-size: 11px; position: absolute; top: 15px; right: 15px; cursor: pointer; border-radius: 8px; border: none; }
        #chat-box { height: 300px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .msg-received { background: #222; color: white; align-self: flex-start; }
        .msg-sent { background: #fff; color: black; align-self: flex-end; }
        .msg-user { font-size: 10px; opacity: 0.7; display: block; }
        .chat-input-area { display: flex; gap: 10px; }
    </style>
</head>
<body>

<!-- Экран Авторизации -->
<div id="auth-screen">
    <div class="auth-card" id="login-form">
        <h2 style="margin-top:0">Вход</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="auth('login')" style="width:100%">Войти</button>
        <p style="font-size:13px; color:#8e8e8e; cursor:pointer" onclick="toggleAuth()">Нет аккаунта? Регистрация</p>
    </div>
    <div class="auth-card hidden" id="reg-form">
        <h2>Регистрация</h2>
        <input type="text" id="reg-user" placeholder="Придумайте логин">
        <input type="password" id="reg-pass" placeholder="Придумайте пароль">
        <button onclick="auth('register')" style="width:100%">Создать аккаунт</button>
        <p style="font-size:13px; color:#8e8e8e; cursor:pointer" onclick="toggleAuth()">Уже есть аккаунт? Войти</p>
    </div>
</div>

<header>DARK SOCIAL</header>
<div class="container">
    <div class="stories-container" id="stories"></div>
    <div class="card" id="main-controls">
        <div style="margin-bottom: 15px; font-weight: 600;">Создать публикацию</div>
        <textarea id="postText" rows="3" placeholder="О чем вы думаете?"></textarea>
        <input type="file" id="fileInput" accept="image/*,video/*">
        <div style="display: flex; justify-content: flex-end;">
            <button class="btn-story" onclick="uploadContent('story')">В историю</button>
            <button onclick="uploadContent('post')">Опубликовать</button>
        </div>
    </div>
    <div id="feed"></div>
    <div class="card">
        <div style="text-align: center; margin-bottom: 10px; font-weight:600">Live Chat</div>
        <div id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentUser = null;

    function toggleAuth() {
        document.getElementById('login-form').classList.toggle('hidden');
        document.getElementById('reg-form').classList.toggle('hidden');
    }

    async function auth(type) {
        const user = type === 'login' ? document.getElementById('auth-user').value : document.getElementById('reg-user').value;
        const pass = type === 'login' ? document.getElementById('auth-pass').value : document.getElementById('reg-pass').value;
        
        const res = await fetch(`/auth/${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.success) {
            currentUser = type === 'login' ? data.username : user;
            document.getElementById('auth-screen').classList.add('hidden');
        } else { alert(data.error); }
    }

    function createPostHTML(p, index) {
        const isAdmin = currentUser === 'admin';
        return `
            <div class="post">
                ${isAdmin ? `<button class="btn-delete" onclick="deletePost(${index})">Удалить</button>` : ''}
                <div class="post-header"><b style="color:white">${p.username}</b> <small style="color:#8e8e8e">${p.date}</small></div>
                <div class="post-text">${p.text}</div>
                ${p.file ? (p.file.match(/\.(mp4|mov|webm)$/i) ? `<video src="${p.file}" controls></video>` : `<img src="${p.file}">`) : ''}
            </div>`;
    }

    async function deletePost(id) {
        if (confirm("Удалить этот пост?")) {
            await fetch('/delete-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, postId: id })
            });
        }
    }

    async function uploadContent(type) {
        const text = document.getElementById('postText').value;
        const fileInput = document.getElementById('fileInput');
        let fileUrl = null;

        if (fileInput.files[0]) {
            const CLOUD_NAME = 'ТВОЙ_CLOUD_NAME'; 
            const UPLOAD_PRESET = 'ТВОЙ_PRESET'; 
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('upload_preset', UPLOAD_PRESET);
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                fileUrl = data.secure_url;
            } catch (e) { alert("Ошибка облака"); return; }
        }

        await fetch('/upload', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ username: currentUser, text, file: fileUrl, type }) 
        });
        document.getElementById('postText').value = '';
        document.getElementById('fileInput').value = '';
    }

    async function init() {
        const pRes = await fetch('/api/posts');
        const posts = await pRes.json();
        document.getElementById('feed').innerHTML = posts.map((p, i) => createPostHTML(p, i)).join('');
        const sRes = await fetch('/api/stories');
        const stories = await sRes.json();
        document.getElementById('stories').innerHTML = stories.map(s => `<div class="story-wrapper"><img src="${s.file}" class="story"><div style="font-size:10px">${s.username}</div></div>`).join('');
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        if (input.value.trim()) {
            socket.emit('message', { user: currentUser, text: input.value });
            input.value = '';
        }
    }

    socket.on('new-post', (post) => {
        // Просто обновляем всё, чтобы индексы для удаления были верными
        init();
    });
    socket.on('new-story', (story) => {
        document.getElementById('stories').insertAdjacentHTML('afterbegin', `<div class="story-wrapper"><img src="${story.file}" class="story"><div style="font-size:10px">${story.username}</div></div>`);
    });
    socket.on('refresh-content', () => init());
    socket.on('message', (msg) => {
        const box = document.getElementById('chat-box');
        const isMe = msg.user === currentUser;
        box.innerHTML += `<div class="msg ${isMe ? 'msg-sent' : 'msg-received'}"><span class="msg-user">${msg.user}</span>${msg.text}</div>`;
        box.scrollTop = box.scrollHeight;
    });
    init();
</script>
</body>
</html>
