<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARK SOCIAL — Database Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-secondary: #8e8e8e;
            --border-color: #262626;
            --input-bg: #1a1a1a;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
        }

        header { 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px);
            color: white; 
            width: 100%; 
            text-align: center; 
            padding: 18px 0; 
            font-size: 18px; 
            font-weight: 700; 
            letter-spacing: 3px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid var(--border-color);
        }
        
        .container { 
            width: 100%; 
            max-width: 600px; 
            padding: 0 15px; 
            margin-top: 20px; 
            padding-bottom: 100px; 
        }
        
        /* Экраны авторизации */
        #auth-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-color); z-index: 2000; 
            display: flex; justify-content: center; align-items: center; 
        }
        .auth-card { 
            background: var(--card-bg); padding: 30px; border-radius: 24px; 
            border: 1px solid var(--border-color); width: 90%; max-width: 380px; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .hidden { display: none !important; }

        /* Истории */
        .stories-container { 
            display: flex; gap: 12px; overflow-x: auto; padding: 20px 0; 
            scrollbar-width: none; 
        }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        .story { 
            width: 68px; height: 68px; background: #222; border-radius: 50%; 
            border: 2px solid var(--accent-color); object-fit: cover; 
        }
        .story-name { font-size: 11px; color: var(--text-secondary); text-align: center; }

        /* Карточки и Инпуты */
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 24px; 
            border: 1px solid var(--border-color); margin-bottom: 20px; 
        }
        input, textarea { 
            width: 100%; background: var(--input-bg); color: white; 
            padding: 14px; border: 1px solid var(--border-color); 
            border-radius: 14px; font-size: 14px; margin-bottom: 10px; 
            box-sizing: border-box; outline: none; transition: var(--transition);
        }
        input:focus, textarea:focus { border-color: var(--accent-color); background: #222; }
        button { 
            background: var(--accent-color); color: black; border: none; 
            padding: 12px 20px; border-radius: 14px; cursor: pointer; 
            font-weight: 600; transition: var(--transition);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-story { background: transparent; color: white; border: 1px solid white; margin-right: 10px; }

        /* Лента */
        .post { 
            background: var(--card-bg); padding: 20px; border-radius: 24px; 
            margin-bottom: 20px; border: 1px solid var(--border-color); 
            animation: slideDown 0.4s ease; position: relative;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .post-user { font-weight: 600; }
        .post-date { font-size: 12px; color: var(--text-secondary); }
        .post-text { font-size: 15px; margin-bottom: 15px; color: #ddd; }
        .post img, .post video { width: 100%; border-radius: 16px; display: block; }
        .btn-delete { 
            position: absolute; top: 15px; right: 15px; background: #ff4444; 
            color: white; border: none; padding: 5px 10px; font-size: 11px; 
            border-radius: 8px; cursor: pointer;
        }

        /* Чат */
        .chat-title { text-align: center; font-weight: 600; margin-bottom: 15px; }
        #chat-box { 
            height: 350px; overflow-y: auto; padding: 10px; 
            display: flex; flex-direction: column; gap: 10px; 
        }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .msg-received { background: #222; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-sent { background: #fff; color: black; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-user { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 4px; }
        .chat-input-area { display: flex; gap: 10px; }
    </style>
</head>
<body>

<!-- Экран Авторизации -->
<div id="auth-screen">
    <div class="auth-card" id="login-form">
        <h2 style="margin-top:0">Вход</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="auth('login')" style="width:100%">Войти</button>
        <p style="font-size:13px; color:#8e8e8e; cursor:pointer; margin-top:15px" onclick="toggleAuth()">Нет аккаунта? Регистрация</p>
    </div>
    <div class="auth-card hidden" id="reg-form">
        <h2 style="margin-top:0">Регистрация</h2>
        <input type="text" id="reg-user" placeholder="Придумайте логин">
        <input type="password" id="reg-pass" placeholder="Придумайте пароль">
        <button onclick="auth('register')" style="width:100%">Создать аккаунт</button>
        <p style="font-size:13px; color:#8e8e8e; cursor:pointer; margin-top:15px" onclick="toggleAuth()">Уже есть аккаунт? Войти</p>
    </div>
</div>

<header>DARK SOCIAL</header>
<div class="container">
    <div class="stories-container" id="stories"></div>
    
    <div class="card">
        <div style="margin-bottom: 15px; font-weight: 600;">Создать публикацию</div>
        <textarea id="postText" rows="3" placeholder="О чем вы думаете?"></textarea>
        <input type="file" id="fileInput" accept="image/*,video/*">
        <div style="display: flex; justify-content: flex-end;">
            <button id="btnStory" class="btn-story" onclick="uploadContent('story')">В историю</button>
            <button id="btnPost" onclick="uploadContent('post')">Опубликовать</button>
        </div>
    </div>

    <div id="feed"></div>

    <div class="card">
        <div class="chat-title">Live Chat</div>
        <div id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Сообщение..." style="margin-bottom:0">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentUser = null;

    // --- !!! ЗАПОЛНИ ЭТИ ДАННЫЕ ИЗ CLOUDINARY !!! ---
    const CLOUD_NAME = ' dyefptrpj '; 
    const UPLOAD_PRESET = ' dark_social_preset '; 
    // ----------------------------------------------

    function toggleAuth() {
        document.getElementById('login-form').classList.toggle('hidden');
        document.getElementById('reg-form').classList.toggle('hidden');
    }

    async function auth(type) {
        const user = type === 'login' ? document.getElementById('auth-user').value : document.getElementById('reg-user').value;
        const pass = type === 'login' ? document.getElementById('auth-pass').value : document.getElementById('reg-pass').value;
        if(!user || !pass) return alert("Заполните все поля");

        try {
            const res = await fetch(`/auth/${type}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = type === 'login' ? data.username : user;
                document.getElementById('auth-screen').classList.add('hidden');
                init();
            } else { alert(data.error); }
        } catch (e) { alert("Ошибка связи с сервером"); }
    }

    function createPostHTML(p, index) {
        const isAdmin = currentUser === 'admin';
        return `
            <div class="post">
                ${isAdmin ? `<button class="btn-delete" onclick="deletePost('${p._id}')">Удалить</button>` : ''}
                <div class="post-header"><b style="color:white">${p.username}</b> <small style="color:#8e8e8e">${new Date(p.date).toLocaleString()}</small></div>
                <div class="post-text">${p.text}</div>
                ${p.file ? (p.file.match(/\.(mp4|mov|webm)$/i) ? `<video src="${p.file}" controls></video>` : `<img src="${p.file}">`) : ''}
            </div>`;
    }

    async function deletePost(id) {
        if (confirm("Удалить этот пост?")) {
            await fetch('/delete-post', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, postId: id })
            });
        }
    }

    async function uploadContent(type) {
        const text = document.getElementById('postText').value;
        const fileInput = document.getElementById('fileInput');
        const btnPost = document.getElementById('btnPost');
        const btnStory = document.getElementById('btnStory');
        let fileUrl = null;

        if (fileInput.files[0]) {
            const file = fileInput.files[0];
            btnPost.disabled = true; btnStory.disabled = true;
            btnPost.innerText = "Загрузка..."; btnStory.innerText = "Загрузка...";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { 
                    method: 'POST', 
                    body: formData 
                });
                const data = await res.json();
                if (res.ok) { fileUrl = data.secure_url; } 
                else { 
                    alert("Ошибка облака: " + (data.error ? data.error.message : "Ошибка")); 
                    btnPost.disabled = false; btnStory.disabled = false;
                    btnPost.innerText = "Опубликовать"; btnStory.innerText = "В историю";
                    return; 
                }
            } catch (e) {
                alert("Ошибка сети при загрузке в облако");
                btnPost.disabled = false; btnStory.disabled = false;
                btnPost.innerText = "Опубликовать"; btnStory.innerText = "В историю";
                return;
            }
        }

        try {
            const response = await fetch('/upload', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ username: currentUser, text, file: fileUrl, type }) 
            });
            if (response.ok) {
                document.getElementById('postText').value = '';
                document.getElementById('fileInput').value = '';
            }
        } catch (e) { alert("Ошибка сервера"); }
        
        btnPost.disabled = false; btnStory.disabled = false;
        btnPost.innerText = "Опубликовать"; btnStory.innerText = "В историю";
    }

    async function init() {
        try {
            const pRes = await fetch('/api/posts');
            const posts = await pRes.json();
            document.getElementById('feed').innerHTML = posts.map((p, i) => createPostHTML(p, i)).join('');
            const sRes = await fetch('/api/stories');
            const stories = await sRes.json();
            document.getElementById('stories').innerHTML = stories.map(s => `<div class="story-wrapper"><img src="${s.file}" class="story"><div class="story-name">${s.username}</div></div>`).join('');
        } catch (e) { console.error("Ошибка загрузки данных"); }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        if (input.value.trim()) {
            socket.emit('message', { user: currentUser, text: input.value });
            input.value = '';
        }
    }

    socket.on('new-post', () => init());
    socket.on('new-story', (story) => {
        document.getElementById('stories').insertAdjacentHTML('afterbegin', `<div class="story-wrapper"><img src="${story.file}" class="story"><div class="story-name">${story.username}</div></div>`);
    });
    socket.on('refresh-content', () => init());
    socket.on('message', (msg) => {
        const box = document.getElementById('chat-box');
        const isMe = msg.user === currentUser;
        box.innerHTML += `<div class="msg ${isMe ? 'msg-sent' : 'msg-received'}"><span class="msg-user">${msg.user}</span>${msg.text}</div>`;
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
